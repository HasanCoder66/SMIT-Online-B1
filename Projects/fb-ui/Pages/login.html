<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="../Styles/login.css">
</head>

<body>
    <div class="container">

        <!-- left area -->
        <div class="left-area">
            <img src="https://static.xx.fbcdn.net/rsrc.php/yB/r/83zWJdc6PJI.webp" alt="" width="500" height="500">
        </div>



        <!-- right area -->
        <div class="right-area">
            <!-- login form card -->
            <div class="loginForm">
                <h2>Log in to Facebook</h2>

                <!-- email address -->

                <div class="email-address">


                    <div class="inputBox">

                        <input type="text" placeholder="Mobile number or email address">
                    </div>


                </div>
                <!-- password input hai -->
                <div class="email-address">


                    <div class="inputBox">

                        <input type="password" placeholder="password">
                    </div>


                </div>

                <!-- btn box -->

                <div class="btnBox">
                    <button id="submit">Log in</button>
                    <a href="../Pages/login.html"><button id="already-account">Forget Password ?</button></a>

<br>
<br>    
                    <a href="../Pages/login.html"><button id="already-account-2">Create new Account</button></a>
                </div>

                <div class="footer-section">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Meta-Logo.png" alt="" height="100"
                        width="150">
        
                </div>
            </div>
        </div>



    </div>
</body>

</html>
